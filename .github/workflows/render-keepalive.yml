name: Keep Render Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          TARGET_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "$TARGET_URL" ]; then
            echo "RENDER_HEALTHCHECK_URL is not set"
            exit 1
          fi

          echo "Pinging $TARGET_URL"
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$TARGET_URL")
          echo "HTTP $status"

          case "$status" in
            2*|3*) exit 0 ;;
            *) echo "Non-success status from keep-alive ping"; exit 1 ;;
          esac
