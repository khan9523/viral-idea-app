name: Keep Render Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          TARGET_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
          TARGET_URL_VAR: ${{ vars.RENDER_HEALTHCHECK_URL }}
        run: |
          url="$TARGET_URL"
          if [ -z "$url" ]; then
            url="$TARGET_URL_VAR"
          fi

          if [ -z "$url" ]; then
            echo "RENDER_HEALTHCHECK_URL is not configured in secrets/vars. Skipping keep-alive ping."
            exit 0
          fi

          echo "Pinging $url"
          status=$(curl -s -o /dev/null -w "%{http_code}" --retry 3 --retry-delay 3 --retry-connrefused --max-time 20 "$url")
          echo "HTTP $status"

          case "$status" in
            2*|3*) exit 0 ;;
            *) echo "Non-success status from keep-alive ping"; exit 1 ;;
          esac
